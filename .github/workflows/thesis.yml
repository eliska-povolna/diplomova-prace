name: Compile LaTeX Thesis

on:
  push:
    paths:
      - "thesis/**"
      - ".github/workflows/thesis.yml"
  pull_request:
    paths:
      - "thesis/**"
      - ".github/workflows/thesis.yml"
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  build-pdf:
    name: Build thesis PDF
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live (full)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: thesis/main.tex
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: thesis/main.pdf
          if-no-files-found: error
          retention-days: 90
