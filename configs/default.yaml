# Default configuration for ELSA + TopK SAE training pipeline
# Hyperparameters match src/yelp_initial_exploration/ reference code
#
# Usage: python src/train.py --config configs/default.yaml

# Data configuration
data:
  parquet_dir: "../../Yelp-JSON/yelp_parquet"
  db_path: "../../Yelp-JSON/yelp.duckdb"
  state_filter: "PA"                    # Set to "CA", "PA", null for full dataset
  min_review_count: 20
  pos_threshold: 4.0                    # Stars >= threshold for positive
  year_min: null                        # Optional year range filters
  year_max: null
  train_test_split: 0.8                 # 80% train, 20% test
  val_split: 0.1                        # 10% of train as validation
  seed: 42

# ELSA model configuration
elsa:
  latent_dim: 512
  learning_rate: 0.0003              # 3e-4
  batch_size: 1024
  num_epochs: 25
  patience: 10
  weight_decay: 0.0
  device: "cpu"                        # or "cuda"

# TopK SAE configuration
sae:
  width_ratio: 2                        # hidden_dim = width_ratio * latent_dim (reduced from 4 to 2: 1024 neurons instead of 2048)
  k: 32                                 # Sparsity: keep top-k activations
  learning_rate: 0.0003              # 3e-4
  l1_coef: 0.0003                    # 3e-4
  batch_size: 1024
  num_epochs: 50
  patience: 10
  min_delta: 0.0001                  # 1e-4
  device: "cpu"                        # or "cuda"

# Output configuration
output:
  base_dir: "outputs"
  log_level: "INFO"                     # DEBUG, INFO, WARNING, ERROR
  save_frequency: 5                     # Save checkpoint every N epochs

# Evaluation configuration
evaluation:
  k_values: [10, 20, 50]                # Compute metrics @ k
  device: "cuda"                        # or "cpu"

# UI and Interpretability configuration
ui:
  semantic_search_threshold: 0.5        # Cosine similarity threshold for semantic search (0.0-1.0)
  semantic_search_top_k: 10             # Maximum number of results to return
