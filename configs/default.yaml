# Training & evaluation configuration
# Override individual values with: python src/train.py --config configs/custom.yaml

data:
  raw_dir: data/raw
  processed_dir: data/processed
  min_user_interactions: 5
  min_item_interactions: 5
  implicit_threshold: 4      # min stars to treat as positive
  val_ratio: 0.1
  test_ratio: 0.1
  n_neg_per_pos: 1

model:
  embedding_dim: 64
  sae_hidden_dim: 512        # should be >> embedding_dim
  sparsity_lambda: 1.0e-3

training:
  cf_epochs: 50
  sae_epochs: 30
  batch_size: 1024
  lr: 1.0e-3
  weight_decay: 1.0e-5
  seed: 42

evaluation:
  k_values: [10, 20]         # Recall@K, NDCG@K, HR@K

logging:
  log_every_n_steps: 100
  checkpoint_dir: checkpoints/
