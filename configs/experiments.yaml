# Final focused PA sweep for production/demo readiness
#
# This file is intentionally narrow: 21 total runs, ELSA fixed, SAE-focused tuning.
# Any list value in an experiment block is treated as a sweep dimension.

experiments:
  - name: final_baseline_pa
    description: "Baseline configuration for final PA sweep"
    data:
      state_filter: "PA"
      min_review_count: 20
      train_test_split: 0.8
      val_split: 0.1

    elsa:
      latent_dim: 512
      learning_rate: 1e-4
      batch_size: 1024
      num_epochs: 40
      patience: 10
      weight_decay: 1e-4
      device: "cpu"

    sae:
      width_ratio: 4
      k: 32
      learning_rate: 1e-4
      l1_coef: 3e-4
      batch_size: 1024
      num_epochs: 50
      patience: 10
      min_delta: 1e-4
      device: "cpu"

  - name: final_sae_k_sweep
    description: "SAE sparsity sweep around the baseline"
    data:
      state_filter: "PA"
      min_review_count: 20
      train_test_split: 0.8
      val_split: 0.1

    elsa:
      latent_dim: 512
      learning_rate: 1e-4
      batch_size: 1024
      num_epochs: 40
      patience: 10
      weight_decay: 1e-4
      device: "cpu"

    sae:
      width_ratio: 4
      k: [16, 24, 32, 48]
      learning_rate: 1e-4
      l1_coef: 3e-4
      batch_size: 1024
      num_epochs: 50
      patience: 10
      min_delta: 1e-4
      device: "cpu"

  - name: final_sae_width_ratio_sweep
    description: "SAE dictionary size sweep"
    data:
      state_filter: "PA"
      min_review_count: 20
      train_test_split: 0.8
      val_split: 0.1

    elsa:
      latent_dim: 512
      learning_rate: 1e-4
      batch_size: 1024
      num_epochs: 40
      patience: 10
      weight_decay: 1e-4
      device: "cpu"

    sae:
      width_ratio: [2, 4, 8]
      k: 32
      learning_rate: 1e-4
      l1_coef: 3e-4
      batch_size: 1024
      num_epochs: 50
      patience: 10
      min_delta: 1e-4
      device: "cpu"

  - name: final_sae_num_epochs_sweep
    description: "SAE training duration sweep"
    data:
      state_filter: "PA"
      min_review_count: 20
      train_test_split: 0.8
      val_split: 0.1

    elsa:
      latent_dim: 512
      learning_rate: 1e-4
      batch_size: 1024
      num_epochs: 40
      patience: 10
      weight_decay: 1e-4
      device: "cpu"

    sae:
      width_ratio: 4
      k: 32
      learning_rate: 1e-4
      l1_coef: 3e-4
      batch_size: 1024
      num_epochs: [50, 100]
      patience: 10
      min_delta: 1e-4
      device: "cpu"

  - name: final_sae_min_delta_sweep
    description: "SAE early-stopping sensitivity sweep"
    data:
      state_filter: "PA"
      min_review_count: 20
      train_test_split: 0.8
      val_split: 0.1

    elsa:
      latent_dim: 512
      learning_rate: 1e-4
      batch_size: 1024
      num_epochs: 40
      patience: 10
      weight_decay: 1e-4
      device: "cpu"

    sae:
      width_ratio: 4
      k: 32
      learning_rate: 1e-4
      l1_coef: 3e-4
      batch_size: 1024
      num_epochs: 50
      patience: 10
      min_delta: [1e-4, 5e-4]
      device: "cpu"

  - name: final_sae_k_width_interaction
    description: "Focused interaction sweep: k x width_ratio"
    data:
      state_filter: "PA"
      min_review_count: 20
      train_test_split: 0.8
      val_split: 0.1

    elsa:
      latent_dim: 512
      learning_rate: 1e-4
      batch_size: 1024
      num_epochs: 40
      patience: 10
      weight_decay: 1e-4
      device: "cpu"

    sae:
      width_ratio: [2, 4, 8]
      k: [24, 32, 48]
      learning_rate: 1e-4
      l1_coef: 3e-4
      batch_size: 1024
      num_epochs: 50
      patience: 10
      min_delta: 1e-4
      device: "cpu"
